<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Rage - Livello 2A</title>
    <style>
        /* =========================================
           1. STILI DI BASE E SFONDO 
           ========================================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Sfondo trasparente per mostrare il sito giornalistico del master */
            background-color: rgba(0, 0, 0, 0.4); 
            user-select: none;
            -webkit-user-select: none;
        }

        /* =========================================
           2. GRAFICA DELLA FINESTRA BANNER
           ========================================= */
        #cookie-modal {
            background-color: #000000; /* Nero profondo coerente con il master */
            border: 1px solid #555555;
            border-radius: 16px;
            padding: 30px 20px 25px 20px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            box-sizing: border-box;
            text-align: center;
        }

        /* Bottone X in alto a destra */
        .close-x {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 20px;
            color: #888888;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
        }
        .close-x:active {
            color: #ffffff;
        }

        /* Testo del Banner */
        h2 {
            color: #ffffff;
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: left;
        }

        p {
            color: #cccccc;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 25px;
            margin-top: 0;
            text-align: left;
        }

        /* =========================================
           3. BOTTONI A COLORI INVERTITI (Il Tranello)
           ========================================= */
        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        .btn-cookie {
            flex: 1;
            padding: 12px 0;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .btn-cookie:active {
            transform: scale(0.95);
        }

        /* RIFIUTA è verde (Ingannevole: porta al Game Over) */
        .btn-fake-accept {
            background-color: #34A853;
            color: #ffffff;
        }

        /* ACCETTA è rosso (Sembra un errore, ma è la scelta corretta) */
        .btn-fake-reject {
            background-color: #EA4335;
            color: #ffffff;
        }

        /* =========================================
           4. STILI PER IL FLASHO VERDE DI CONFERMA
           ========================================= */
        .result-screen {
            display: none; 
            padding: 20px 0;
        }
        
        .result-title {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="cookie-modal">
        
        <div id="level-content">
            <span class="close-x" onclick="triggerGameOver('Hai cliccato la X senza accettare!')">&times;</span>
            <h2>Personalizzazione Annunci</h2>
            <p>I nostri partner pubblicitari utilizzano tracciatori avanzati per profilare i tuoi interessi commerciali. Clicca su ACCETTA per confermare il consenso al marketing mirato.</p>
            
            <div class="btn-container">
                <button class="btn-cookie btn-fake-accept" onclick="triggerGameOver('Sei caduto nel tranello dei colori invertiti!')">RIFIUTA</button>
                <button class="btn-cookie btn-fake-reject" onclick="triggerSuccess()">ACCETTA</button>
            </div>
        </div>

        <div id="result-content" class="result-screen">
            <div id="result-title" class="result-title"></div>
        </div>

    </div>

    <script>
        const levelContent = document.getElementById('level-content');
        const resultContent = document.getElementById('result-content');
        const resultTitle = document.getElementById('result-title');
        const modalBox = document.getElementById('cookie-modal');

        // Funzione Vittoria (Se clicca il tasto ROSSO "ACCETTA")
        function triggerSuccess() {
            levelContent.style.display = 'none';
            resultContent.style.display = 'block';
            modalBox.style.border = "2px solid #34A853";
            resultTitle.style.color = "#34A853";
            resultTitle.innerText = "✓ ACCETTATO";

            // Aspetta 1 secondo e sblocca il livello nel Master
            setTimeout(() => {
                window.parent.postMessage({ action: 'completeLevel' }, '*');
            }, 1000);
        }

        // Funzione Sconfitta (Se clicca il tasto VERDE o la X)
        function triggerGameOver(reason) {
            window.parent.postMessage({ action: 'gameOver', reason: reason }, '*');
        }
    </script>
</body>
</html>
