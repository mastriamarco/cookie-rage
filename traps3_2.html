<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Rage - Livello 3_2</title>
    <style>
        /* =========================================
           1. STILI DI BASE E SFONDO
           ========================================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.4); 
            user-select: none;
            -webkit-user-select: none;
        }

        /* =========================================
           2. GRAFICA DELLA FINESTRA BANNER
           ========================================= */
        #cookie-modal {
            background-color: #000000;
            border: 1px solid #555555;
            border-radius: 16px;
            padding: 30px 20px 25px 20px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            box-sizing: border-box;
            text-align: center;
        }

        .close-x {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 20px;
            color: #888888;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
        }
        .close-x:active {
            color: #ffffff;
        }

        h2 {
            color: #ffffff;
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: left;
        }

        p {
            color: #cccccc;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 25px;
            margin-top: 0;
            text-align: left;
        }

        /* =========================================
           3. BOTTONI NEUTRI IDENTICI
           ========================================= */
        .btn-container {
            display: flex;
            flex-direction: column; /* Impilati verticalmente per forzare la lettura */
            gap: 12px;
            width: 100%;
        }

        .btn-neutral {
            width: 100%;
            padding: 14px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid #444444;
            cursor: pointer;
            background-color: #2a2a2a; /* Grigio scuro, per non dare indizi visivi */
            color: #ffffff;
            letter-spacing: 0.5px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-neutral:active {
            transform: scale(0.97);
            background-color: #444444;
        }

        /* =========================================
           4. SCHERMATA RISULTATO
           ========================================= */
        .result-screen {
            display: none; 
            padding: 20px 0;
        }
        
        .result-title {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="cookie-modal">
        
        <div id="level-content">
            <span class="close-x" onclick="triggerGameOver('Hai cliccato la X senza accettare!')">&times;</span>
            <h2>Consenso Terze Parti</h2>
            <p>I nostri partner richiedono una conferma esplicita per l'utilizzo dei tuoi dati. Leggi attentamente e seleziona la tua preferenza logica.</p>
            
            <div class="btn-container">
                <button class="btn-neutral" onclick="triggerGameOver('Hai letto troppo in fretta! Hai accettato di rifiutare.')">Accetto di Rifiutare</button>
                
                <button class="btn-neutral" onclick="triggerSuccess()">Non rifiuto di Accettare</button>
            </div>
        </div>

        <div id="result-content" class="result-screen">
            <div id="result-title" class="result-title"></div>
        </div>

    </div>

    <script>
        const levelContent = document.getElementById('level-content');
        const resultContent = document.getElementById('result-content');
        const resultTitle = document.getElementById('result-title');
        const modalBox = document.getElementById('cookie-modal');

        function triggerSuccess() {
            levelContent.style.display = 'none';
            resultContent.style.display = 'block';
            modalBox.style.border = "2px solid #34A853";
            resultTitle.style.color = "#34A853";
            resultTitle.innerText = "✓ ACCETTATO";

            setTimeout(() => {
                window.parent.postMessage({ action: 'completeLevel' }, '*');
            }, 1000);
        }

        function triggerGameOver(reason) {
            window.parent.postMessage({ action: 'gameOver', reason: reason }, '*');
        }
    </script>
</body>
</html>
