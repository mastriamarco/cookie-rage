<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Rage - Livello 4_4</title>
    <style>
        /* =========================================
           1. STILI DI BASE E SFONDO
           ========================================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.4); 
            user-select: none; -webkit-user-select: none;
        }

        /* =========================================
           2. GRAFICA DELLA FINESTRA BANNER
           ========================================= */
        #cookie-modal {
            background-color: #000000;
            border: 1px solid #555555;
            border-radius: 16px;
            padding: 30px 20px 25px 20px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            box-sizing: border-box;
            text-align: center;
        }

        .close-x {
            position: absolute; top: 12px; right: 16px;
            font-size: 20px; color: #888888; cursor: pointer; font-weight: bold;
        }

        h2 { color: #ffffff; margin: 0 0 12px 0; font-size: 18px; font-weight: 600; text-align: left; }
        p { color: #cccccc; font-size: 13px; line-height: 1.5; margin: 0 0 25px 0; text-align: left; }

        /* =========================================
           3. BOTTONE A SCORRIMENTO (SLIDER CUSTOM)
           ========================================= */
        .slide-btn-container {
            position: relative;
            width: 100%;
            height: 50px;
            background-color: #4285F4;
            border-radius: 25px;
            overflow: hidden;
            cursor: pointer;
            touch-action: none; /* Impedisce lo scroll della pagina durante il drag */
            margin-bottom: 10px;
        }

        .slide-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 50px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            pointer-events: none; /* Il testo non blocca il click sottostante */
            letter-spacing: 0.5px;
        }

        /* Il pallino da trascinare */
        .slide-handle {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 40px;
            height: 40px;
            background-color: white;
            color: #4285F4;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            cursor: grab;
            z-index: 2;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            transition: transform 0s; /* Disabilitato durante il drag */
        }

        .slide-handle:active { cursor: grabbing; }

        /* =========================================
           4. SCHERMATA RISULTATO
           ========================================= */
        .result-screen { display: none; padding: 20px 0; }
        .result-title { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cookie-modal">
        
        <div id="level-content">
            <span class="close-x" onclick="triggerGameOver('Hai cliccato la X senza localizzarti!')">&times;</span>
            <h2>Sblocco Coordinate</h2>
            <p>Abbiamo quasi finito. Manca solo una rapida conferma manuale per sbloccare l'uso del GPS sul tuo dispositivo.</p>
            
            <div class="slide-btn-container" id="slide-container" onclick="handleContainerClick(event)">
                <div class="slide-text">SCORRI PER ACCETTARE</div>
                
                <div class="slide-handle" id="slide-handle" 
                     onmousedown="startDrag(event)" 
                     ontouchstart="startDrag(event)">&#10140;</div>
            </div>
        </div>

        <div id="result-content" class="result-screen">
            <div id="result-title" class="result-title"></div>
        </div>

    </div>

    <script>
        const handle = document.getElementById('slide-handle');
        const container = document.getElementById('slide-container');
        
        const levelContent = document.getElementById('level-content');
        const resultContent = document.getElementById('result-content');
        const resultTitle = document.getElementById('result-title');
        const modalBox = document.getElementById('cookie-modal');

        let isDragging = false;
        let startX = 0;
        let maxDrag = 0;

        // --- LOGICA DEL TRASCINAMENTO ---
        function startDrag(e) {
            e.stopPropagation(); // Evita che il click passi al contenitore rosso
            isDragging = true;
            
            // Calcola quanto spazio ha il bottone per scorrere (Larghezza totale - larghezza pallino - margini)
            maxDrag = container.offsetWidth - handle.offsetWidth - 10; 
            
            // Prende la posizione iniziale del mouse/dito
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            
            // Aggiunge gli ascoltatori per il movimento
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag, {passive: false});
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchend', stopDrag);
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault(); // Blocca comportamenti strani su mobile
            
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let diff = clientX - startX;
            
            // Limiti fisici del trascinamento
            if (diff < 0) diff = 0;
            if (diff > maxDrag) diff = maxDrag;
            
            handle.style.transform = `translateX(${diff}px)`;
            
            // Se arriva in fondo, VITTORIA!
            if (diff >= maxDrag - 2) {
                isDragging = false;
                triggerSuccess();
            }
        }

        function stopDrag() {
            if(!isDragging) return;
            isDragging = false;
            
            // Se molla prima di arrivare in fondo, il pallino torna indietro come un elastico
            handle.style.transition = "transform 0.3s ease";
            handle.style.transform = `translateX(0px)`;
            setTimeout(() => { handle.style.transition = "transform 0s"; }, 300);
            
            // Rimuove gli ascoltatori
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchend', stopDrag);
        }

        // --- LOGICA DELLA TRAPPOLA DEL CLICK ---
        function handleContainerClick(e) {
            // Se l'utente clicca sul blu invece di trascinare il bianco, perde istantaneamente.
            triggerGameOver("Hai Cliccato! Dovevi TRASCINARE il pulsante.");
        }

        // --- VITTORIA E SCONFITTA ---
        function triggerSuccess() {
            // Rimuovi listener pendenti per sicurezza
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('touchmove', drag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchend', stopDrag);

            levelContent.style.display = 'none';
            resultContent.style.display = 'block';
            modalBox.style.border = "2px solid #34A853";
            resultTitle.style.color = "#34A853";
            resultTitle.innerText = "✓ ACCETTATO";

            setTimeout(() => {
                window.parent.postMessage({ action: 'completeLevel' }, '*');
            }, 1000);
        }

        function triggerGameOver(reason) {
            window.parent.postMessage({ action: 'gameOver', reason: reason }, '*');
        }
    </script>
</body>
</html>
