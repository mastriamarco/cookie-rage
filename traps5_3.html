<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Rage - Livello 5_3</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.4); 
            user-select: none; -webkit-user-select: none;
        }

        #cookie-modal {
            background-color: #000000;
            border: 1px solid #555555;
            border-radius: 12px;
            padding: 20px;
            width: 340px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            box-sizing: border-box;
        }

        /* Header Captcha */
        .captcha-header {
            background-color: #4285F4;
            color: white;
            padding: 15px;
            margin: -20px -20px 15px -20px;
            border-radius: 12px 12px 0 0;
        }
        .captcha-header span { font-size: 13px; opacity: 0.9; }
        .captcha-header strong { font-size: 18px; display: block; margin-top: 5px; }

        /* Griglia dinamica */
        #captcha-grid {
            display: grid;
            gap: 4px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .grid-2x2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3x3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4x4 { grid-template-columns: repeat(4, 1fr); }

        .captcha-item {
            background-color: #1a1a1a;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 2px;
            transition: border 0.1s;
        }

        .captcha-item.selected {
            border: 4px solid #34A853;
            background-color: #0d2b16;
        }

        /* Footer */
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .robot-link {
            color: #555;
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
        }

        .btn-verifica {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-verifica:active { transform: scale(0.95); }

        .result-screen { display: none; text-align: center; padding: 20px 0; }
        .result-title { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cookie-modal">
        <div id="level-content">
            <div class="captcha-header">
                <span>Seleziona tutti i riquadri con</span>
                <strong id="target-label">Semafori (2)</strong>
            </div>
            
            <div id="captcha-grid" class="grid-2x2"></div>
            
            <div class="action-row">
                <span class="robot-link" onclick="triggerGameOver('Hai ammesso di essere un robot!')">Sono un robot</span>
                <button class="btn-verifica" onclick="verifyCaptcha()">VERIFICA</button>
            </div>
        </div>

        <div id="result-content" class="result-screen">
            <div id="result-title" class="result-title"></div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('captcha-grid');
        const targetLabel = document.getElementById('target-label');
        const levelContent = document.getElementById('level-content');
        const resultContent = document.getElementById('result-content');
        const resultTitle = document.getElementById('result-title');
        const modalBox = document.getElementById('cookie-modal');

        let stage = 1;
        let selectedCount = 0;
        let requiredCount = 2; 
        
        const otherIcons = ["🚗", "🚌", "🚲", "🏠", "🌳", "🚒", "🚑"];

        function countTotalSemaphores() {
            const items = document.querySelectorAll('.captcha-item');
            let count = 0;
            items.forEach(item => {
                if (item.innerText === "🚦") count++;
            });
            return count;
        }

        function initStage() {
            grid.innerHTML = '';
            selectedCount = 0;
            let numItems = 0;

            if (stage === 1) {
                numItems = 4; requiredCount = 2;
                grid.className = 'grid-2x2';
            } else if (stage === 2) {
                numItems = 9; requiredCount = 4;
                grid.className = 'grid-3x3';
            } else if (stage === 3) {
                numItems = 16; requiredCount = 4; 
                grid.className = 'grid-4x4';
            }

            targetLabel.innerText = `Semafori (${requiredCount})`;

            let initialGrid = [];
            if (stage < 3) {
                for (let i = 0; i < requiredCount; i++) initialGrid.push("🚦");
                for (let i = requiredCount; i < numItems; i++) initialGrid.push(otherIcons[Math.floor(Math.random() * otherIcons.length)]);
            } else if (stage === 3) {
                for (let i = 0; i < 4; i++) initialGrid.push("🚦");
                for (let i = 4; i < 16; i++) initialGrid.push(otherIcons[Math.floor(Math.random() * otherIcons.length)]);
            }
            initialGrid.sort(() => Math.random() - 0.5);

            for (let i = 0; i < numItems; i++) {
                const div = document.createElement('div');
                div.className = 'captcha-item';
                div.innerText = initialGrid[i];
                
                div.onclick = () => handleItemClick(div);
                grid.appendChild(div);

                if (stage === 3) {
                    const randomDelay = Math.random() * 400;
                    setTimeout(() => startIndependentFlicker(div), randomDelay);
                }
            }
        }

        // --- GESTIONE CAMBIO ICONA CON TEMPI DIFFERENZIATI ---
        function startIndependentFlicker(item) {
            if (item.classList.contains('selected')) return; 
            
            let nextIcon;
            let isSemaphore = false;

            // 25% di possibilità di pescare un semaforo
            if (Math.random() < 0.25) {
                if (countTotalSemaphores() < 5) {
                    nextIcon = "🚦";
                    isSemaphore = true;
                } else {
                    nextIcon = otherIcons[Math.floor(Math.random() * otherIcons.length)];
                }
            } else {
                nextIcon = otherIcons[Math.floor(Math.random() * otherIcons.length)];
            }
            
            item.innerText = nextIcon;
            
            // --- CALCOLO DEL TIMER IN BASE ALL'ICONA ---
            let currentDelay;
            if (isSemaphore) {
                // Il semaforo resta fermo più a lungo per dare tempo di click (tra 800ms e 1100ms)
                currentDelay = Math.floor(Math.random() * 300) + 800;
            } else {
                // Le altre icone sfrecciano via velocissime (tra 200ms e 500ms)
                currentDelay = Math.floor(Math.random() * 300) + 200;
            }
            
            item.flickerTimer = setTimeout(() => startIndependentFlicker(item), currentDelay);
        }

        function handleItemClick(el) {
            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                selectedCount--;
                if (stage === 3) startIndependentFlicker(el); 
            } else {
                el.classList.add('selected');
                selectedCount++;
                if (stage === 3) clearTimeout(el.flickerTimer); 
            }

            if (stage === 1 && selectedCount === requiredCount) {
                stage = 2;
                setTimeout(initStage, 300);
            } else if (stage === 2 && selectedCount === requiredCount) {
                stage = 3;
                setTimeout(initStage, 300);
            }
        }

        function stopAllTimers() {
            const items = document.querySelectorAll('.captcha-item');
            items.forEach(item => clearTimeout(item.flickerTimer));
        }

        function verifyCaptcha() {
            stopAllTimers();

            if (stage === 3 && selectedCount >= requiredCount) {
                let isPerfect = true;
                const selectedItems = document.querySelectorAll('.captcha-item.selected');
                
                selectedItems.forEach(item => {
                    if (item.innerText !== "🚦") isPerfect = false;
                });

                if (isPerfect) {
                    triggerSuccess();
                } else {
                    triggerGameOver("Verifica fallita! Uno o più elementi selezionati non erano semafori. Guarda bene!");
                }
            } else {
                triggerGameOver("Verifica fallita! Non hai selezionato abbastanza semafori o la griglia è incompleta.");
            }
        }

        function triggerSuccess() {
            stopAllTimers();
            levelContent.style.display = 'none';
            resultContent.style.display = 'block';
            modalBox.style.border = "2px solid #34A853";
            resultTitle.style.color = "#34A853";
            resultTitle.innerText = "✓ ACCETTATO";
            setTimeout(() => { window.parent.postMessage({ action: 'completeLevel' }, '*'); }, 1000);
        }

        function triggerGameOver(reason) {
            stopAllTimers();
            window.parent.postMessage({ action: 'gameOver', reason: reason }, '*');
        }

        initStage();
    </script>
</body>
</html>
