<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Rage - Livello 6_3</title>
    <style>
        /* =========================================
           1. STILI DI BASE E SFONDO
           ========================================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: rgba(0, 0, 0, 0.4); 
            user-select: none; -webkit-user-select: none;
        }

        /* =========================================
           2. GRAFICA DELLA FINESTRA BANNER
           ========================================= */
        #cookie-modal {
            background-color: #000000;
            border: 1px solid #555555;
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            box-sizing: border-box;
        }

        .close-x {
            position: absolute; top: 12px; right: 16px;
            font-size: 20px; color: #888888; cursor: pointer; font-weight: bold;
        }

        h2 { color: #ffffff; margin: 0 0 10px 0; font-size: 18px; font-weight: 600; text-align: left; }
        p { color: #cccccc; font-size: 13px; line-height: 1.4; margin: 0 0 20px 0; text-align: left; }

        /* =========================================
           3. IL FORM DELLE TENDINE
           ========================================= */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        select:focus { border-color: #4285F4; }

        /* =========================================
           4. BOTTONE SALVA
           ========================================= */
        .btn-salva {
            width: 100%;
            padding: 14px 0;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background-color: #4285F4;
            color: #ffffff;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-salva:active { transform: scale(0.97); }

        .result-screen { display: none; text-align: center; padding: 20px 0; }
        .result-title { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cookie-modal">
        <div id="level-content">
            <span class="close-x" onclick="triggerGameOver('Hai chiuso il modulo senza profilarti!')">&times;</span>
            <h2>Dati Profilazione</h2>
            <p>Per una pubblicità davvero pertinente, abbiamo bisogno di conoscere i tuoi dettagli demografici esatti.</p>
            
            <div class="form-group">
                <label>Età del Soggetto</label>
                <select id="select-age">
                    <option value="none">Seleziona età...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Identità di Genere</label>
                <select id="select-gender">
                    <option value="none">Seleziona genere...</option>
                </select>
            </div>
            
            <button class="btn-salva" onclick="validateForm()">SALVA PROFILO</button>
        </div>

        <div id="result-content" class="result-screen">
            <div id="result-title" class="result-title"></div>
        </div>
    </div>

    <script>
        const ageSelect = document.getElementById('select-age');
        const genderSelect = document.getElementById('select-gender');
        const levelContent = document.getElementById('level-content');
        const resultContent = document.getElementById('result-content');
        const resultTitle = document.getElementById('result-title');
        const modalBox = document.getElementById('cookie-modal');

        // --- INIZIALIZZAZIONE ETÀ (485 -> 100, poi 50 Troll, poi 99 -> 0) ---
        function initAge() {
            // Numeri alti
            for (let i = 485; i >= 100; i--) {
                let opt = document.createElement('option');
                opt.value = "val"; opt.innerText = i;
                ageSelect.appendChild(opt);
            }
            // 50 Opzioni Troll
            const trolls = ["Non voglio dirlo", "Rifiuto la profilazione", "Sconosciuto", "Errore 404", "Privacy garantita"];
            for (let i = 0; i < 50; i++) {
                let opt = document.createElement('option');
                opt.value = "trap";
                opt.innerText = trolls[i % trolls.length];
                ageSelect.appendChild(opt);
            }
            // Numeri normali
            for (let i = 99; i >= 0; i--) {
                let opt = document.createElement('option');
                opt.value = "val"; opt.innerText = i;
                ageSelect.appendChild(opt);
            }
        }

        // --- INIZIALIZZAZIONE GENERE (20 opzioni rimescolate) ---
        function initGender() {
            const valids = [
                { t: "Uomo", v: "ok" },
                { t: "Donna", v: "ok" }
            ];
            const trolls = [
                "Cookie al cioccolato", "Nuvola passeggera", "Elfo di terzo livello", "Connessione instabile",
                "Robot senziente", "Soffio di vento", "Entità astrale", "Vibrazione quantistica",
                "File .zip", "Algoritmo confuso", "Spam", "Unicorn spaziale", "Pixel grigio",
                "Cavo USB-C", "Router Wi-Fi", "Pulsante non cliccato", "Senza nome", "Utente anonimo"
            ];

            let dataset = [...valids];
            trolls.forEach(t => dataset.push({ t: t, v: "trap" }));

            // Shuffle
            dataset.sort(() => Math.random() - 0.5);

            dataset.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.v; opt.innerText = item.t;
                genderSelect.appendChild(opt);
            });
        }

        // --- VALIDAZIONE FORM ---
        function validateForm() {
            const ageVal = ageSelect.value;
            const genderVal = genderSelect.value;

            if (ageVal === "none" || genderVal === "none") {
                triggerGameOver("Hai lasciato i campi vuoti! Profilazione incompleta.");
                return;
            }

            if (ageVal === "trap") {
                triggerGameOver("Hai scelto un'opzione che nega il consenso!");
                return;
            }

            if (genderVal === "trap") {
                triggerGameOver("Genere non supportato dai nostri inserzionisti pubblicitari.");
                return;
            }

            // Se arriva qui, ha selezionato un numero nell'età e Uomo/Donna nel genere
            triggerSuccess();
        }

        function triggerSuccess() {
            levelContent.style.display = 'none';
            resultContent.style.display = 'block';
            modalBox.style.border = "2px solid #34A853";
            resultTitle.style.color = "#34A853";
            resultTitle.innerText = "✓ PROFILATO";

            setTimeout(() => {
                window.parent.postMessage({ action: 'completeLevel' }, '*');
            }, 1000);
        }

        function triggerGameOver(reason) {
            window.parent.postMessage({ action: 'gameOver', reason: reason }, '*');
        }

        initAge();
        initGender();
    </script>
</body>
</html>
