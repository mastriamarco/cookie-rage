<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Rage - Livello 7_4</title>
    <style>
        /* =========================================
           1. STILI DI BASE E SFONDO
           ========================================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0; height: 100vh;
            background-color: rgba(0, 0, 0, 0.4); 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            position: relative;
            user-select: none; -webkit-user-select: none;
        }

        /* =========================================
           2. GRAFICA DELLA FINESTRA BANNER
           ========================================= */
        #cookie-modal {
            background-color: #000000;
            border: 1px solid #555555;
            border-radius: 16px;
            padding: 25px 20px 20px 20px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            box-sizing: border-box;
            z-index: 10;
        }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .stage-indicator {
            color: #4285F4;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .lives-container {
            color: #EA4335;
            font-size: 14px;
            letter-spacing: 2px;
        }

        h2 { color: #ffffff; margin: 0 0 8px 0; font-size: 18px; font-weight: 600; text-align: left; }
        p.desc { color: #cccccc; font-size: 12px; line-height: 1.4; margin: 0 0 20px 0; text-align: left; }

        /* =========================================
           3. IL MECCANISMO DEL QTE (La Barra)
           ========================================= */
        .qte-track {
            width: 100%;
            height: 28px;
            background-color: #111111;
            border: 1px solid #333333;
            border-radius: 6px;
            position: relative;
            margin-bottom: 20px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Zona bersaglio verde ("Consenti") */
        .target-zone {
            position: absolute;
            top: 0;
            height: 100%;
            background-color: #34A853;
            box-shadow: 0 0 10px rgba(52, 168, 83, 0.5);
            transition: left 0.1s ease, width 0.1s ease;
        }

        /* Il cursore mobile che si riempie/scorre */
        .qte-pointer {
            position: absolute;
            top: 0; left: 0;
            width: 5px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 0 8px #ffffff, 0 0 15px #4285F4;
            z-index: 5;
        }

        /* =========================================
           4. IL TASTONE DI INTERAZIONE
           ========================================= */
        .btn-trigger {
            width: 100%;
            padding: 15px 0;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background-color: #4285F4;
            color: #ffffff;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
        }

        .btn-trigger:active { transform: scale(0.98); }

        /* =========================================
           5. SCHERMATA RISULTATO
           ========================================= */
        .result-screen { display: none; padding: 20px 0; }
        .result-title { font-size: 24px; font-weight: bold; color: #34A853; }
    </style>
</head>
<body>

    <div id="cookie-modal">
        <div id="level-content">
            <div class="header-status">
                <span class="stage-indicator" id="stage-label">STAGE 1 / 3</span>
                <span class="lives-container" id="lives-label">❤️❤️❤️</span>
            </div>
            
            <h2>Sincronizzazione Tracker</h2>
            <p class="desc">Per autorizzare il trasferimento dei cookie push, calibra la frequenza di tracciamento premendo il pulsante quando l'indicatore luminoso è sulla zona verde.</p>
            
            <div class="qte-track">
                <div class="target-zone" id="target-zone"></div>
                <div class="qte-pointer" id="qte-pointer"></div>
            </div>
            
            <button class="btn-trigger" id="btn-action" onclick="handleInput()">ACCETTA E CALIBRA</button>
        </div>

        <div id="result-content" class="result-screen">
            <div id="result-title" class="result-title">✓ COOKIE ATTIVATI</div>
        </div>
    </div>

    <script>
        const pointer = document.getElementById('qte-pointer');
        const targetZone = document.getElementById('target-zone');
        const stageLabel = document.getElementById('stage-label');
        const livesLabel = document.getElementById('lives-label');
        const levelContent = document.getElementById('level-content');
        const resultContent = document.getElementById('result-content');
        const modalBox = document.getElementById('cookie-modal');

        let currentStage = 1;
        let lives = 3;
        let animationActive = true;

        // Configurazione degli Stage
        // Lo Stage 3 ora mantiene la stessa ampiezza dello Stage 2 (15%) come richiesto
        const stageConfigs = {
            1: { width: 25, speed: 0.4 },  
            2: { width: 15, speed: 0.7 },  
            3: { width: 15, speed: 1.1 }  // Stessa larghezza dello stage 2, ma più veloce
        };

        let pointerPos = 0;
        let direction = 1; 
        let zoneLeft = 0;  

        // --- INIZIALIZZAZIONE DELLO STAGE CORRENTE ---
        function setupStage() {
            const config = stageConfigs[currentStage];
            stageLabel.innerText = `STAGE ${currentStage} / 3`;
            
            if (currentStage === 3) {
                stageLabel.style.color = "#EA4335";
                stageLabel.innerText = `⚠️ CALIBRAZIONE FINALE 3 / 3`;
            } else {
                // Ripristina il colore blu standard se il giocatore è stato rispedito indietro
                stageLabel.style.color = "#4285F4";
            }

            // Calcola una posizione casuale per l'area verde (escludendo i bordi estremi)
            const maxLeftOffset = 100 - config.width - 15;
            zoneLeft = Math.floor(Math.random() * (maxLeftOffset - 15)) + 15;

            // Applica visivamente la larghezza e la posizione
            targetZone.style.width = config.width + '%';
            targetZone.style.left = zoneLeft + '%';

            // Resetta il cursore all'inizio della pista
            pointerPos = 0;
            direction = 1;
        }

        // --- LOOP DI ANIMAZIONE IN REAL TIME (60FPS) ---
        function updateTimeline() {
            if (!animationActive) return;

            const config = stageConfigs[currentStage];
            pointerPos += config.speed * direction;

            // Effetto rimbalzo sui bordi della pista
            if (pointerPos >= 100) {
                pointerPos = 100;
                direction = -1;
            } else if (pointerPos <= 0) {
                pointerPos = 0;
                direction = 1;
            }

            pointer.style.left = pointerPos + '%';
            requestAnimationFrame(updateTimeline);
        }

        // --- VERIFICA DEL CLICK DELL'UTENTE ---
        function handleInput() {
            if (!animationActive) return;

            const config = stageConfigs[currentStage];
            const zoneRight = zoneLeft + config.width;

            // Controllo se la coordinata attuale del puntatore cade dentro i margini della zona verde
            if (pointerPos >= zoneLeft && pointerPos <= zoneRight) {
                // Bersaglio Centrato!
                if (currentStage === 3) {
                    animationActive = false;
                    triggerSuccess();
                } else {
                    currentStage++;
                    setupStage();
                }
            } else {
                // Bersaglio Mancato! Togliamo una vita in qualunque stage ci si trovi
                lives--;
                updateLivesDisplay();
                
                if (lives <= 0) {
                    animationActive = false;
                    triggerGameOver("Hai esaurito i tentativi di calibrazione per i cookie.");
                } else {
                    // SE CORRETTO: Torna allo stage 1 mantendo le vite rimanenti!
                    currentStage = 1;
                    setupStage();
                }
            }
        }

        function updateLivesDisplay() {
            let hearts = "";
            for (let i = 0; i < 3; i++) {
                hearts += (i < lives) ? "❤️" : "🖤";
            }
            livesLabel.innerText = hearts;
        }

        // --- CONCLUSIONE LIVELLO ---
        function triggerSuccess() {
            levelContent.style.display = 'none';
            resultContent.style.display = 'block';
            modalBox.style.border = "2px solid #34A853";
            setTimeout(() => {
                window.parent.postMessage({ action: 'completeLevel' }, '*');
            }, 1000);
        }

        function triggerGameOver(reason) {
            window.parent.postMessage({ action: 'gameOver', reason: reason }, '*');
        }

        window.onload = () => {
            setupStage();
            updateTimeline();
        };
    </script>
</body>
</html>
