<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Rage - Livello 7_2</title>
    <style>
        /* =========================================
           1. STILI DI BASE E SFONDO OSCURATO
           ========================================= */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0; height: 100vh;
            /* L'oscuramento richiesto */
            background-color: rgba(0, 0, 0, 0.8); 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            position: relative;
            user-select: none; -webkit-user-select: none;
        }

        /* Un finto banner centrale disattivato per fare scena */
        #dummy-banner {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 30px;
            width: 300px;
            text-align: center;
            color: #555;
            filter: blur(2px);
            pointer-events: none;
        }

        /* =========================================
           2. IL FALSO POP-UP NATIVO (Stile Chrome)
           ========================================= */
        .fake-native-prompt {
            position: absolute;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            width: 290px;
            padding: 16px 16px 12px 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .prompt-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .prompt-icon {
            font-size: 18px;
            color: #5f6368;
            margin-top: 2px;
        }

        .prompt-text {
            font-size: 13px;
            color: #202124;
            line-height: 1.4;
            text-align: left;
        }

        .prompt-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .prompt-btn {
            background: transparent;
            border: none;
            color: #1a73e8; /* Blu Google */
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .prompt-btn:hover { background-color: #f1f3f4; }
        .prompt-btn:active { background-color: #e8eaed; }

        .btn-block { color: #5f6368; } /* Grigio per Blocca per ingannare l'occhio */

        /* =========================================
           3. SCHERMATA RISULTATO
           ========================================= */
        .result-screen { display: none; padding: 20px; text-align: center; z-index: 2000; position: absolute;}
        .result-title { font-size: 28px; font-weight: bold; color: #34A853; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
    </style>
</head>
<body>

    <div id="dummy-banner">
        <h2>Inizializzazione...</h2>
        <p>Attendi la configurazione del browser.</p>
    </div>

    <div class="fake-native-prompt" id="fake-prompt" style="display: none;">
        <div class="prompt-header">
            <span class="prompt-icon">🔔</span>
            <span class="prompt-text"><b>Il sistema</b> vorrebbe<br>Mostrare le notifiche</span>
        </div>
        <div class="prompt-actions">
            <button class="prompt-btn btn-block" onclick="clickBlocca()">Blocca</button>
            <button class="prompt-btn" onclick="clickConsenti()">Consenti</button>
        </div>
    </div>

    <div id="result-content" class="result-screen">
        <div class="result-title">✓ NOTIFICHE ATTIVE</div>
    </div>

    <script>
        const promptEl = document.getElementById('fake-prompt');
        const resultContent = document.getElementById('result-content');
        const dummyBanner = document.getElementById('dummy-banner');
        
        let step = 1;
        let brutalTimer;

        // --- GESTIONE DEGLI SPOSTAMENTI (INCEPTION) ---
        function spawnPrompt() {
            // Spegne le transizioni per teletrasportare l'elemento senza che si veda volare sullo schermo
            promptEl.style.transition = 'none';
            promptEl.style.display = 'flex';

            // Teletrasporto al punto di partenza nascosto fuori dallo schermo
            if (step === 1) {
                promptEl.style.top = '20px';
                promptEl.style.left = '-350px';
                promptEl.style.bottom = 'auto';
                promptEl.style.right = 'auto';
                promptEl.style.transform = 'none';
            } else if (step === 2) {
                promptEl.style.bottom = '-150px';
                promptEl.style.left = '50%';
                promptEl.style.top = 'auto';
                promptEl.style.right = 'auto';
                promptEl.style.transform = 'translateX(-50%)';
            } else if (step === 3) {
                promptEl.style.top = '50%';
                promptEl.style.right = '-350px';
                promptEl.style.bottom = 'auto';
                promptEl.style.left = 'auto';
                promptEl.style.transform = 'translateY(-50%)';
            } else if (step === 4) {
                promptEl.style.top = '-150px';
                promptEl.style.left = '50%';
                promptEl.style.bottom = 'auto';
                promptEl.style.right = 'auto';
                promptEl.style.transform = 'translateX(-50%)';
            }

            // Forza il reflow del DOM per applicare immediatamente il teletrasporto
            void promptEl.offsetWidth;

            // Riaccende le animazioni CSS in modo fluido e veloce
            promptEl.style.transition = 'all 0.15s cubic-bezier(0.25, 0.8, 0.25, 1)';

            // Fa scivolare il pop-up nella sua posizione visibile finale
            if (step === 1) {
                promptEl.style.left = '20px';
            } else if (step === 2) {
                promptEl.style.bottom = '20px';
            } else if (step === 3) {
                promptEl.style.right = '20px';
            } else if (step === 4) {
                promptEl.style.top = '20px';
                
                // LA TRAPPOLA BRUTALE: Il timer di 1 secondo (1000ms)
                brutalTimer = setTimeout(() => {
                    // Lo fa scorrere di nuovo verso l'alto
                    promptEl.style.top = '-150px'; 
                    // Ritardo di 200ms per fargli finire l'animazione di uscita prima del Game Over
                    setTimeout(() => triggerGameOver("Sei stato troppo lento! La notifica è scomparsa."), 200);
                }, 600); 
            }
        }

        // --- GESTIONE DEI CLICK ---
        function clickConsenti() {
            if (step === 4) {
                // Ha cliccato in tempo! Ferma il timer letale.
                clearTimeout(brutalTimer);
                promptEl.style.display = 'none';
                triggerSuccess();
                return;
            }
            
            // Avanza allo step successivo
            step++;
            spawnPrompt();
        }

        function clickBlocca() {
            clearTimeout(brutalTimer);
            triggerGameOver("Hai cliccato Blocca! La fretta ti ha ingannato.");
        }

        // --- VITTORIA E SCONFITTA ---
        function triggerSuccess() {
            dummyBanner.style.display = 'none';
            resultContent.style.display = 'block';
            setTimeout(() => {
                window.parent.postMessage({ action: 'completeLevel' }, '*');
            }, 1000);
        }

        function triggerGameOver(reason) {
            window.parent.postMessage({ action: 'gameOver', reason: reason }, '*');
        }

        // Inizia il livello appena si carica
        window.onload = () => {
            spawnPrompt();
        };
    </script>
</body>
</html>
